name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      runtime_tag: ${{ steps.lock.outputs.runtime_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute runtime tag from uv.lock
        id: lock
        run: |
          set -euo pipefail
          LOCK_HASH=$(sha1sum < uv.lock | cut -d' ' -f1)
          RUNTIME_TAG="python-${LOCK_HASH}"
          echo "runtime_tag=${RUNTIME_TAG}" >> "$GITHUB_OUTPUT"
          echo "RUNTIME_TAG=${RUNTIME_TAG}" >> "$GITHUB_ENV"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Diagnostics
        run: |
          {
            echo "## Build diagnostics"
            echo
            echo "RUNTIME_TAG=\`${RUNTIME_TAG}\`"
            echo
            echo "### Versions"
            echo '```'
            docker --version
            docker buildx version
            echo '```'
            echo
            echo "### Manifest inspect (existing tag check)"
            echo '```'
            docker manifest inspect "kirimaru/fastapi-practice_dev-runtime:${RUNTIME_TAG}" 2>&1 | head -20 || echo "(manifest missing → will build)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build & push dev_runtime (only if tag missing)
        run: |
          set -euxo pipefail
          if docker manifest inspect "kirimaru/fastapi-practice_dev-runtime:${RUNTIME_TAG}" > /dev/null 2>&1; then
            echo "Image already exists, skipping push."
            exit 0
          fi
          docker buildx create --name builder --use --platform linux/amd64
          # 失敗時に最後の出力を summary に残す
          set +e
          docker buildx build --builder builder \
            --progress=plain \
            --target dev_runtime \
            -t "kirimaru/fastapi-practice_dev-runtime:${RUNTIME_TAG}" \
            --output type=image,oci-mediatypes=true,compression=zstd,compression-level=3,force-compression=true,push=true \
            . 2>&1 | tee /tmp/buildx.log
          STATUS=${PIPESTATUS[0]}
          set -e
          {
            echo "### docker buildx build status: ${STATUS}"
            echo '```'
            tail -120 /tmp/buildx.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${STATUS}"

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUILD_TARGET: test
      RUNTIME_TAG: ${{ needs.build.outputs.runtime_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull dev_runtime image
        run: docker pull "kirimaru/fastapi-practice_dev-runtime:${RUNTIME_TAG}"

      - name: Compose up
        run: docker compose up -d --wait

      - name: DB migration
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: docker compose exec -T api uv run alembic upgrade head

      - name: Run tests
        id: pytest
        run: |
          set +e
          docker compose exec -T api uv run pytest --alluredir=/app/allure-results 2>&1 | tee /tmp/pytest.log
          echo "status=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Dump diagnostics on failure
        if: always()
        run: |
          {
            echo "## pytest status: ${{ steps.pytest.outputs.status }}"
            echo
            echo "### pytest log (tail)"
            echo '```'
            tail -200 /tmp/pytest.log 2>/dev/null || echo "(no pytest log)"
            echo '```'
            echo
            echo "### docker compose ps"
            echo '```'
            docker compose ps
            echo '```'
            echo
            echo "### api container logs (tail)"
            echo '```'
            docker compose logs --tail=120 api 2>&1 || true
            echo '```'
            echo
            echo "### db container logs (tail)"
            echo '```'
            docker compose logs --tail=60 db 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if pytest failed
        if: steps.pytest.outputs.status != '0'
        run: exit 1

      - name: Post pytest log to PR on failure (diagnostic)
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BODY_FILE=/tmp/pr-comment.md
          {
            echo "### :rotating_light: CI diagnostic dump (\`${{ github.sha }}\`)"
            echo
            echo "pytest status: \`${{ steps.pytest.outputs.status }}\`"
            echo
            echo "<details><summary>pytest log (tail 200)</summary>"
            echo
            echo '```'
            tail -200 /tmp/pytest.log 2>/dev/null || echo "(no pytest log)"
            echo '```'
            echo
            echo "</details>"
            echo
            echo "<details><summary>docker compose ps</summary>"
            echo
            echo '```'
            docker compose ps || true
            echo '```'
            echo
            echo "</details>"
            echo
            echo "<details><summary>api container logs (tail 120)</summary>"
            echo
            echo '```'
            docker compose logs --tail=120 api 2>&1 || true
            echo '```'
            echo
            echo "</details>"
          } > "$BODY_FILE"
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --data @<(jq -Rs '{body: .}' < "$BODY_FILE") \
            || true

      - name: Copy Allure results from container
        if: always()
        run: docker cp "$(docker compose ps -q api)":/app/allure-results ./allure-results

      - name: Build test report
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: allure-results

      - name: Publish test report
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
