name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      runtime_tag: ${{ steps.lock.outputs.runtime_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute runtime tag from uv.lock
        id: lock
        run: |
          set -euo pipefail
          LOCK_HASH=$(sha1sum < uv.lock | cut -d' ' -f1)
          RUNTIME_TAG="python-${LOCK_HASH}"
          echo "runtime_tag=${RUNTIME_TAG}" >> "$GITHUB_OUTPUT"
          echo "RUNTIME_TAG=${RUNTIME_TAG}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push dev_runtime (only if tag missing)
        run: |
          set -euxo pipefail
          if docker manifest inspect "kirimaru/fastapi-practice_dev-runtime:${RUNTIME_TAG}" > /dev/null 2>&1; then
            echo "Image already exists, skipping push."
            exit 0
          fi
          docker buildx build \
            --target dev_runtime \
            --tag "kirimaru/fastapi-practice_dev-runtime:${RUNTIME_TAG}" \
            --output type=image,oci-mediatypes=true,compression=zstd,compression-level=3,force-compression=true,push=true \
            --cache-from "type=registry,ref=kirimaru/fastapi-practice_dev-runtime:buildcache" \
            --cache-to   "type=registry,ref=kirimaru/fastapi-practice_dev-runtime:buildcache,mode=max" \
            .

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUILD_TARGET: test
      RUNTIME_TAG: ${{ needs.build.outputs.runtime_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull dev_runtime image
        run: docker pull "kirimaru/fastapi-practice_dev-runtime:${RUNTIME_TAG}"

      - name: Compose up
        run: docker compose up -d --wait

      - name: DB migration
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: docker compose exec -T api uv run alembic upgrade head

      - name: Run tests
        run: docker compose exec -T api uv run pytest --alluredir=/app/allure-results

      - name: Setup tmate session (on failure)
        uses: mxschmitt/action-tmate@v3
        if: failure()
        timeout-minutes: 15

      - name: Copy Allure results from container
        if: always()
        run: docker cp "$(docker compose ps -q api)":/app/allure-results ./allure-results

      - name: Build test report
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: allure-results

      - name: Publish test report
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
