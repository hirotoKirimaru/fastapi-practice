x-common-env: &common_env
  AWS_S3_ACCESS_KEY: minio
  AWS_S3_SECRET_KEY: minio1234

services:
  api:
    build:
      context: .
      target: ${BUILD_TARGET:-dev}
      args:
        - RUNTIME_TAG=${RUNTIME_TAG:-latest}
    volumes:
      # アプリ側パスは /app（Dockerfile の WORKDIR と合わせる）
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic:/app/alembic
    environment:
      <<: *common_env
      ENV: local
      S3_BUCKET: tmp.local
    ports:
      - "8000:8000"
    networks:
      - development_network
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: mysql:8.4
    # M1 Mac で必要なら上書き: `docker compose --file compose.yml --file compose.arm64.yml up`
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: demo
      TZ: Asia/Tokyo
    volumes:
      - mysql_data:/var/lib/mysql
    command: --mysql-native-password=ON
    ports:
      - "33306:3306"
    networks:
      - development_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  storage:
    image: minio/minio:latest
    entrypoint: sh
    command: -c "mkdir -p /data/data-exchange.local /data/tmp.local && /usr/bin/minio server --address :9000 --console-address :9001 /data"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${AWS_S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${AWS_S3_SECRET_KEY:-minio1234}
      ENV_TEST: ${CI+AAA}${CI-BBB}
    env_file:
      - docker.env
    networks:
      - development_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  kvs:
    image: redis:7-alpine
    volumes:
      - kvs_data:/data
    networks:
      - development_network

  mail:
    # MailHog はメンテ停止のため後継の mailpit を推奨（互換 UI/SMTP）
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - development_network

  # docker network 内 localhost:9000 で MinIO にアクセスさせるための中継
  relay:
    image: alpine/socat
    depends_on:
      - api
      - storage
    command: "TCP-LISTEN:9000,fork TCP:storage:9000"
    network_mode: service:api

volumes:
  mysql_data:
  minio_data:
  kvs_data:

networks:
  development_network:
