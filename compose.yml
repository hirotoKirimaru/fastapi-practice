x-common-env: &common_env
  AWS_S3_ACCESS_KEY: minio
  AWS_S3_SECRET_KEY: minio1234

services:
  api:
    build:
      context: .
      target: ${BUILD_TARGET:-dev}
      args:
        - RUNTIME_TAG=${RUNTIME_TAG:-latest}
    volumes:
      # アプリ側パスは /app（Dockerfile の WORKDIR と合わせる）
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic:/app/alembic
    environment:
      <<: *common_env
      ENV: local
      S3_BUCKET: tmp.local
      # ローカル / CI 用のダミー値。本番は .env 等で上書きする
      SECRET: ${SECRET:-dev-secret-change-me}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-dummy-for-local-ci}
      PROJECT_NAME: ${PROJECT_NAME:-fastapi-practice}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost:5173}
    ports:
      - "8000:8000"
    networks:
      - development_network
    depends_on:
      - db
      - storage

  db:
    image: mysql:8.4
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: demo
      TZ: Asia/Tokyo
    volumes:
      - mysql_data:/var/lib/mysql
    command: --mysql-native-password=ON
    ports:
      - "33306:3306"
    networks:
      - development_network

  storage:
    image: minio/minio:latest
    entrypoint: sh
    command: -c "mkdir -p /data/data-exchange.local /data/tmp.local && /usr/bin/minio server --address :9000 --console-address :9001 /data"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${AWS_S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${AWS_S3_SECRET_KEY:-minio1234}
      ENV_TEST: ${CI+AAA}${CI-BBB}
    env_file:
      - docker.env
    networks:
      - development_network

  kvs:
    image: redis:7-alpine
    volumes:
      - kvs_data:/data
    networks:
      - development_network

  mail:
    # MailHog はメンテ停止のため後継の mailpit を使用（互換 UI/SMTP）
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - development_network

  # docker network 内 localhost:9000 で MinIO にアクセスさせるための中継
  relay:
    image: alpine/socat
    depends_on:
      - api
      - storage
    command: "TCP-LISTEN:9000,fork TCP:storage:9000"
    network_mode: service:api

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    ports:
      - "5173:5173"
    networks:
      - development_network
    depends_on:
      - api

volumes:
  mysql_data:
  minio_data:
  kvs_data:

networks:
  development_network:
